databases:
  - name: tempotempo-db
    plan: free
    databaseName: tempotempo
    user: tempotempo

services:
  - type: web
    name: tempotempo-api
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python -m gunicorn core.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: tempotempo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: SERVE_MEDIA
        value: true
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: ^https://.*\.vercel\.app$
      - key: WEB_CONCURRENCY
        value: 2
